name: Build (on Release)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build for (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    env:
      INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release id (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: resolve_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.INPUT_TAG;
            core.info(`Resolving release by tag: ${tag}`);
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner: context.repo.owner, repo: context.repo.repo, tag });
            core.setOutput('release_id', release.id);

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          releaseId: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_release.outputs.release_id || github.event.release.id }}
          tagName: ${{ env.INPUT_TAG }}
          includeDebug: false
          args: --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
